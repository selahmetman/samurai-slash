<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Samurai Slash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060402;display:flex;align-items:center;justify-content:center;
     height:100vh;overflow:hidden;user-select:none;font-family:Georgia,serif;touch-action:none}
#wrap{position:relative}
canvas{display:block;border-radius:14px;box-shadow:0 0 80px #cc110055,0 0 160px #88000033}
#ov{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(4,2,6,.95);backdrop-filter:blur(14px);
    overflow-y:auto}
h1{color:#fff;font-size:36px;font-weight:900;letter-spacing:3px;margin:0;text-align:center;
   text-shadow:0 0 24px #cc2200,0 0 60px #880000}
.pbtn{border:none;background:linear-gradient(135deg,#cc1100,#660000);color:#fff;
      padding:13px 44px;font-size:19px;font-family:Georgia,serif;font-weight:700;
      border-radius:40px;cursor:pointer;box-shadow:0 0 30px #cc110066}
.sbtn{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#ccc;
      padding:11px 24px;font-size:15px;font-family:Georgia,serif;border-radius:40px;
      cursor:pointer;margin-left:10px}
#dpad{position:absolute;bottom:22px;left:16px;display:none;
      grid-template-areas:'. u .' 'l . r' '. d .';
      grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:5px}
.dp{border:2px solid rgba(255,80,0,.35);background:rgba(20,5,5,.8);color:rgba(255,180,100,.85);
    font-size:22px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    touch-action:none;cursor:pointer}
.dp:active,.dp.held{background:rgba(180,30,0,.65);border-color:rgba(255,100,0,.7)}
#dU{grid-area:u}#dL{grid-area:l}#dR{grid-area:r}#dD{grid-area:d}
#dashBtn{position:absolute;bottom:28px;right:18px;width:72px;height:72px;border-radius:50%;
  border:2.5px solid rgba(255,160,0,.55);background:radial-gradient(circle at 38% 36%,#2a0800,#0a0000);
  color:rgba(255,200,80,.9);font-size:26px;display:none;align-items:center;justify-content:center;
  touch-action:none;cursor:pointer;box-shadow:0 0 18px rgba(255,80,0,.35);flex-direction:column;gap:1px}
#dashBtn.ready{border-color:rgba(255,180,0,.8);box-shadow:0 0 28px rgba(255,120,0,.6)}
#dashBtn.active{background:radial-gradient(circle at 38% 36%,#ff6600,#660000);border-color:#ffcc00}
#dashCool{font-size:8px;color:rgba(255,160,60,.7);letter-spacing:1px}

/* ── IN-GAME MENU BUTTON ────────────────────────────── */
#menuBtn{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:none;
  border:1px solid rgba(255,255,255,.22);background:rgba(8,2,2,.82);color:rgba(255,200,140,.9);
  padding:5px 20px;font-size:12px;font-family:Georgia,serif;border-radius:20px;cursor:pointer;
  backdrop-filter:blur(6px);z-index:10;letter-spacing:1px;white-space:nowrap}
#menuBtn:active{background:rgba(140,20,0,.85)}

/* ── PAUSE OVERLAY ──────────────────────────────────── */
#pausePanel{position:absolute;inset:0;border-radius:14px;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(4,2,6,.93);backdrop-filter:blur(16px);z-index:20}
#pausePanel h2{color:#fff;font-size:28px;letter-spacing:4px;
  text-shadow:0 0 20px #cc2200,0 0 50px #880000;margin-bottom:6px}

/* ── LOGIN PANEL ────────────────────────────────────── */
.inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);color:#fff;
  padding:11px 18px;font-size:15px;font-family:Georgia,serif;border-radius:8px;
  outline:none;width:240px;text-align:center;margin:4px 0}
.inp::placeholder{color:#554433}
.inp:focus{border-color:rgba(200,80,0,.65);box-shadow:0 0 14px rgba(180,40,0,.3)}
.divider{display:flex;align-items:center;gap:10px;width:240px;margin:6px 0}
.divider span{color:#443322;font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

/* ── LEADERBOARD ─────────────────────────────────────── */
#lbPanel{width:100%;padding:8px 14px 4px}
.lb-title{font-size:12px;font-weight:900;letter-spacing:4px;color:#cc4400;
  text-shadow:0 0 14px #cc2200;text-align:center;margin-bottom:10px}
.lb-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;
  margin:3px 0;background:rgba(255,255,255,.04)}
.lb-row.r1{background:rgba(200,150,0,.14);border:1px solid rgba(200,150,0,.25)}
.lb-row.r2{background:rgba(180,180,200,.07)}
.lb-row.r3{background:rgba(160,90,40,.1)}
.lb-row.me{border:1px solid rgba(200,80,0,.4)!important}
.lb-rank{width:22px;font-size:14px;text-align:center;flex-shrink:0}
.lb-name{flex:1;font-size:12px;color:#ccbbaa;letter-spacing:1px;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis}
.lb-score{font-size:13px;font-weight:700;color:#ffcc88;text-align:right;white-space:nowrap}
.lb-kills{font-size:10px;color:#776655;margin-left:6px;white-space:nowrap}
.lb-empty{color:#443322;font-size:12px;text-align:center;padding:20px 0;letter-spacing:2px}
#lbUserBadge{font-size:11px;color:#cc6600;text-align:center;margin:4px 0 8px;
  letter-spacing:1px;min-height:16px}

/* ── CHARACTER SELECT ───────────────────────────────── */
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;padding:0 10px;margin:10px 0 6px}
.char-card{border:2px solid rgba(255,255,255,.1);border-radius:11px;padding:7px 4px 9px;
           cursor:pointer;background:rgba(0,0,0,.45);display:flex;flex-direction:column;
           align-items:center;gap:3px;transition:border-color .2s,box-shadow .2s,background .2s}
.char-card:hover{border-color:rgba(255,255,255,.28);background:rgba(0,0,0,.65)}
.char-card canvas{border-radius:7px;background:#000;display:block}
.char-kanji{color:#fff;font-size:18px;margin-top:3px;text-align:center;line-height:1}
.char-name{font-size:8px;letter-spacing:2px;text-align:center;font-weight:700;margin-top:1px}
.char-sub{font-size:7px;color:#555;text-align:center;line-height:1.4}
.stats-wrap{width:100%;padding:0 2px;margin-top:3px}
.stat-row{display:flex;align-items:center;gap:3px;margin-top:2px}
.stat-lbl{font-size:6px;color:#444;width:16px;flex-shrink:0;letter-spacing:1px}
.stat-bar{flex:1;height:3px;background:#181818;border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ov">
    <!-- LOGIN -->
    <div id="loginPanel" style="display:flex;flex-direction:column;align-items:center">
      <div style="font-size:58px;margin-bottom:6px">⚔️</div>
      <h1>SAMURAI SLASH</h1>
      <p style="color:#776655;font-size:11px;margin:10px 0 20px;text-align:center;letter-spacing:1px">
        SAVAŞA HAZIR MISIN?
      </p>
      <input class="inp" id="loginName" type="text" maxlength="18" placeholder="Kullanıcı Adı" autocomplete="off"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="pbtn" style="margin-top:10px;padding:12px 38px" onclick="doLogin()">GİRİŞ YAP ⚔️</button>
      <div class="divider"><span>ya da</span></div>
      <button class="sbtn" style="margin:0;font-size:14px;padding:10px 28px" onclick="doGuest()">🥷 Misafir Olarak Oyna</button>
      <p id="loginErr" style="color:#cc4400;font-size:11px;margin-top:10px;min-height:14px"></p>
    </div>

    <!-- MAIN MENU -->
    <div id="menuPanel" style="display:none;flex-direction:column;align-items:center">
      <div style="font-size:60px;margin-bottom:8px">⚔️</div>
      <h1>SAMURAI SLASH</h1>
      <p style="color:#aa8866;font-size:12px;margin:10px 0 22px;text-align:center;line-height:2">
        Pfeile = Bewegen · Ziehen = Katana-Hieb<br>Ninja überleben nicht zweimal
      </p>
      <p id="bestLbl" style="display:none;color:#ffcc00;font-size:14px;margin:0 0 14px;text-shadow:0 0 8px #ffcc00">
        🏆 Bestes: <span id="bestVal">0</span>
      </p>
      <div id="menuUser" style="color:#cc6600;font-size:12px;margin-bottom:14px;letter-spacing:1px"></div>
      <button class="pbtn" onclick="showCharSelect()">SAVAŞÇI SEÇ ⚔️</button>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="sbtn" style="margin:0;font-size:13px" onclick="showLeaderboard()">🏆 Skor Tablosu</button>
        <button class="sbtn" style="margin:0;font-size:13px" onclick="doLogout()">⬅ Çıkış</button>
      </div>
      <div style="margin-top:14px;color:#332211;font-size:11px;text-align:center;line-height:2">
        🥷 Ninja · 🗡 Suikastçı · 🛡 Muhafız
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div id="lbPanel" style="display:none;flex-direction:column;align-items:center;width:100%;padding:10px 0 6px">
      <div class="lb-title">🏆 SKOR TABLOSU</div>
      <div id="lbUserBadge"></div>
      <div id="lbList" style="width:100%;padding:0 10px;max-height:420px;overflow-y:auto"></div>
      <button class="sbtn" style="margin:12px 0 4px" onclick="showMenu()">← Geri</button>
    </div>

    <!-- CHARACTER SELECT -->
    <div id="charPanel" style="display:none;flex-direction:column;align-items:center;width:100%;padding:12px 0 8px">
      <div style="font-size:11px;font-weight:900;letter-spacing:4px;color:#cc4400;
                  text-shadow:0 0 14px #cc2200;margin-bottom:10px">SAVAŞÇINI SEÇ</div>
      <div class="char-grid" id="charGrid"></div>
      <div id="charDesc" style="color:#998877;font-size:10px;text-align:center;
                                 min-height:24px;padding:0 18px;margin:2px 0 10px;line-height:1.5"></div>
      <button class="pbtn" id="fightBtn" onclick="startGame()" style="padding:11px 38px;font-size:17px">
        SAVAŞA GİR ⚔️
      </button>
    </div>

    <!-- GAME OVER -->
    <div id="goPanel" style="display:none;flex-direction:column;align-items:center">
      <div style="font-size:52px;margin-bottom:8px">💀</div>
      <h1>DÜŞTÜN</h1>
      <div style="color:#fff;font-size:26px;margin:14px 0 3px;text-shadow:0 0 12px #cc2200">
        <b id="killsVal">0</b> Öldürme
      </div>
      <div style="color:#ffcc88;font-size:18px;margin:2px 0 4px"><b id="scoreVal">0</b> Puan</div>
      <div id="recLbl" style="display:none;color:#ffcc00;font-size:13px;margin:3px 0;text-shadow:0 0 8px #ffcc00">
        🏆 Yeni Rekor!
      </div>
      <div style="display:flex;margin-top:20px;gap:8px">
        <button class="pbtn" onclick="startGame()">YENİDEN</button>
        <button class="sbtn" style="margin:0" onclick="showLeaderboard()">🏆</button>
        <button class="sbtn" style="margin:0" onclick="showMenu()">Menü</button>
      </div>
    </div>
  </div>

  <div id="dpad">
    <div class="dp" id="dU">▲</div>
    <div class="dp" id="dL">◀</div>
    <div class="dp" id="dR">▶</div>
    <div class="dp" id="dD">▼</div>
  </div>
  <div id="dashBtn" class="ready">
    <span>💨</span>
    <div id="dashCool"></div>
  </div>
  <!-- IN-GAME MENU BUTTON -->
  <button id="menuBtn" onclick="pauseGame()">☰ MENÜ</button>
  <!-- PAUSE OVERLAY -->
  <div id="pausePanel">
    <h2>⏸ DURAKLANDI</h2>
    <button class="pbtn" style="padding:11px 38px" onclick="resumeGame()">▶ DEVAM ET</button>
    <button class="sbtn" style="margin:0;padding:11px 28px;font-size:15px" onclick="restartFromPause()">↺ YENİDEN BAŞLA</button>
    <button class="sbtn" style="margin:0;padding:11px 28px;font-size:15px" onclick="menuFromPause()">⬅ ANA MENÜ</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),PI2=Math.PI*2;
let W=480,H=680;
function resize(){
  const s=Math.min(1,window.innerWidth/480,(window.innerHeight)/680);
  W=Math.round(480*s);H=Math.round(680*s);
  canvas.width=W;canvas.height=H;
  const w=document.getElementById('wrap');w.style.width=W+'px';w.style.height=H+'px';
}
resize();window.addEventListener('resize',resize);

// ── Input ──────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
const dmap={dU:'arrowup',dD:'arrowdown',dL:'arrowleft',dR:'arrowright'};
Object.entries(dmap).forEach(([id,key])=>{
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=true;el.classList.add('held');},{passive:false}));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=false;el.classList.remove('held');},{passive:false}));
});

let blade=[],mx=W/2,my=H/3;
function onDragMove(cx,cy){
  const r=canvas.getBoundingClientRect();
  const x=(cx-r.left)*(W/r.width),y=(cy-r.top)*(H/r.height);
  mx=x;my=y;
  if(g){blade.push({x,y});if(blade.length>26)blade.shift();}
}
canvas.addEventListener('mousemove',e=>{if(e.buttons)onDragMove(e.clientX,e.clientY);else{const r=canvas.getBoundingClientRect();mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);}});
canvas.addEventListener('mouseleave',()=>blade=[]);
canvas.addEventListener('mouseup',()=>blade=[]);
const activeTouches={};
canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){const r=canvas.getBoundingClientRect();const x=(t.clientX-r.left)*(W/r.width),y=(t.clientY-r.top)*(H/r.height);activeTouches[t.identifier]={x,y};mx=x;my=y;}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(activeTouches[t.identifier]!==undefined)onDragMove(t.clientX,t.clientY);}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)delete activeTouches[t.identifier];if(!Object.keys(activeTouches).length)blade=[];},{passive:false});

// ── User / Login ─────────────────────────────────────────────────
let currentUser=null;
(function initUser(){
  const saved=localStorage.getItem('ss_user');
  if(saved)currentUser={name:saved,guest:false};
})();

function doLogin(){
  const name=document.getElementById('loginName').value.trim();
  const err=document.getElementById('loginErr');
  if(!name){err.textContent='Kullanıcı adı girin';return;}
  if(name.length<2){err.textContent='En az 2 karakter';return;}
  currentUser={name,guest:false};
  localStorage.setItem('ss_user',name);
  showMenu();
}
function doGuest(){
  currentUser={name:'Misafir_'+Math.floor(1000+Math.random()*9000),guest:true};
  showMenu();
}
function doLogout(){
  currentUser=null;localStorage.removeItem('ss_user');showLogin();
}
function showLogin(){
  document.getElementById('ov').style.display='flex';
  setPanel('loginPanel');
  document.getElementById('loginName').value='';
  document.getElementById('loginErr').textContent='';
}

// ── Leaderboard ──────────────────────────────────────────────────
const LB_KEY='ss_lb';
function saveScore(score,kills){
  if(!currentUser||score<=0)return;
  const lb=getScores();
  const idx=lb.findIndex(r=>r.name===currentUser.name);
  if(idx>=0){
    if(score>lb[idx].score){lb[idx].score=score;lb[idx].kills=kills;lb[idx].d=Date.now();}
  } else {
    lb.push({name:currentUser.name,score,kills,d:Date.now()});
  }
  lb.sort((a,b)=>b.score-a.score);
  lb.splice(50);
  localStorage.setItem(LB_KEY,JSON.stringify(lb));
}
function getScores(){
  try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch{return[];}
}
function showLeaderboard(){
  const lb=getScores();
  const MEDAL=['🥇','🥈','🥉'];
  document.getElementById('lbUserBadge').textContent=
    currentUser?('👤 '+currentUser.name+(currentUser.guest?' (Misafir)':'')):'';
  const list=document.getElementById('lbList');
  if(!lb.length){list.innerHTML='<div class="lb-empty">Henüz skor yok</div>';
  }else{
    list.innerHTML=lb.slice(0,15).map((r,i)=>{
      const me=currentUser&&r.name===currentUser.name;
      const cls='lb-row'+(i<3?' r'+(i+1):'')+(me?' me':'');
      return`<div class="${cls}">
        <span class="lb-rank">${i<3?MEDAL[i]:'#'+(i+1)}</span>
        <span class="lb-name">${r.name}</span>
        <span class="lb-score">${r.score.toLocaleString()}</span>
        <span class="lb-kills">${r.kills}💀</span>
      </div>`;
    }).join('');
  }
  document.getElementById('ov').style.display='flex';
  setPanel('lbPanel');
}

// ── Panel helper ─────────────────────────────────────────────────
function setPanel(id){
  ['loginPanel','menuPanel','charPanel','goPanel','lbPanel'].forEach(p=>{
    const el=document.getElementById(p);
    if(el)el.style.display=p===id?'flex':'none';
  });
}

// ── Pause ────────────────────────────────────────────────────────
let paused=false;
function pauseGame(){
  if(!g||paused)return;
  paused=true;cancelAnimationFrame(raf);blade=[];
  document.getElementById('pausePanel').style.display='flex';
}
function resumeGame(){
  if(!paused)return;
  paused=false;
  document.getElementById('pausePanel').style.display='none';
  _resumeLoop();
}
let _resumeLoop=()=>{};
function restartFromPause(){
  document.getElementById('pausePanel').style.display='none';
  paused=false;startGame();
}
function menuFromPause(){
  document.getElementById('pausePanel').style.display='none';
  paused=false;if(raf)cancelAnimationFrame(raf);g=null;blade=[];
  document.getElementById('dpad').style.display='none';
  document.getElementById('dashBtn').style.display='none';
  document.getElementById('menuBtn').style.display='none';
  showMenu();
}

// ── Helpers ──────────────────────────────────────────────────────
function segCircle(ax,ay,bx,by,cx,cy,r){
  const dx=bx-ax,dy=by-ay,fx=ax-cx,fy=ay-cy,a=dx*dx+dy*dy;if(a<.01)return false;
  const b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-r*r,d=b*b-4*a*c;if(d<0)return false;
  const s=Math.sqrt(d);return((-b-s)/(2*a)>=0&&(-b-s)/(2*a)<=1)||((-b+s)/(2*a)>=0&&(-b+s)/(2*a)<=1);
}

// ── CHARACTER DEFINITIONS ─────────────────────────────────────────
const CHARS={
  kage:{
    name:'KAGE',kanji:'影',title:'Shadow Samurai',
    desc:'Ausgeglichen. Meister des Katana. Schnell und tödlich auf mittlere Distanz.',
    spd:3.0,slashR:120,hp:5,r:26,
    theme:'#cc1100',col:'#ff4400',eye:'#ffaa00',eye2:'#ffcc44',
    stats:{spd:3,reach:3,hp:3,spc:2}
  },
  kensei:{
    name:'KENSEI',kanji:'剣聖',title:'Sword Saint',
    desc:'Nodachi-Klinge mit enormer Reichweite. Wer in seine Nähe kommt, stirbt weit entfernt.',
    spd:1.9,slashR:200,hp:6,r:26,
    theme:'#4488ff',col:'#88aaff',eye:'#88ddff',eye2:'#aaeeff',
    stats:{spd:2,reach:5,hp:4,spc:1}
  },
  hayabusa:{
    name:'HAYABUSA',kanji:'隼',title:'Falcon Ninja',
    desc:'Blitzschnell. Feuert automatisch Shuriken auf den nächsten Feind.',
    spd:4.8,slashR:80,hp:3,r:19,
    theme:'#cc44ff',col:'#00ffcc',eye:'#00ffcc',eye2:'#88ffee',
    stats:{spd:5,reach:2,hp:2,spc:5}
  },
  oni:{
    name:'ONI',kanji:'鬼',title:'Demon Lord',
    desc:'Massiv und unaufhaltsam. Treffer schlagen Feinde weg. Enormes Leben.',
    spd:1.3,slashR:155,hp:10,r:33,
    theme:'#44cc00',col:'#aaff00',eye:'#aaff00',eye2:'#ccff44',
    stats:{spd:1,reach:4,hp:5,spc:3}
  }
};

let selectedChar='kage',previewRaf=null,previewTick=0;

// ── DRAW CHARACTER (used for both game + previews) ──────────────
function drawCharacter(lctx,type,x,y,r,face,tick,opts={}){
  const {invT=0,moving=false,walkT=0}=opts;
  if(invT>0&&Math.floor(invT/5)%2===1)return;
  const C=CHARS[type];
  const pulse=0.5+0.5*Math.sin(tick*0.07);
  const pulse2=0.5+0.5*Math.sin(tick*0.11+1.2);

  lctx.save();
  lctx.translate(x,y);
  const bob=moving?Math.sin(walkT*PI2)*.055:0;
  lctx.scale(1+bob,1-bob*.5);

  // Aura glow
  const aura=lctx.createRadialGradient(0,0,r*.5,0,0,r*2.2);
  aura.addColorStop(0,C.theme+'55');aura.addColorStop(.5,C.theme+'18');aura.addColorStop(1,'rgba(0,0,0,0)');
  lctx.fillStyle=aura;lctx.beginPath();lctx.arc(0,0,r*2.2,0,PI2);lctx.fill();

  // Shadow
  lctx.save();lctx.globalAlpha=.35;lctx.fillStyle='#000';
  lctx.scale(1,.5);lctx.translate(r*.2,r*.7);
  lctx.beginPath();lctx.arc(0,0,r*1.15,0,PI2);lctx.fill();lctx.restore();

  lctx.rotate(face);

  // ── BODY ────────────────────────────────────────────────────
  lctx.save();lctx.beginPath();lctx.arc(0,0,r,0,PI2);lctx.clip();
  const armorColors={
    kage:['#2e2e2e','#0f0505'],kensei:['#1a2244','#04091a'],
    hayabusa:['#18001e','#08001a'],oni:['#0e2008','#030a03']
  }[type];
  const bg=lctx.createRadialGradient(-r*.2,-r*.2,r*.06,0,0,r);
  bg.addColorStop(0,armorColors[0]);bg.addColorStop(.45,armorColors[1]);bg.addColorStop(1,'#000');
  lctx.fillStyle=bg;lctx.fillRect(-r,-r,r*2,r*2);

  // Armor pattern
  if(type==='kage'){
    lctx.strokeStyle='rgba(180,0,0,.42)';lctx.lineWidth=1.4;
    for(let ly=-r+5;ly<r;ly+=7){lctx.beginPath();lctx.moveTo(-r,ly);lctx.lineTo(r,ly);lctx.stroke();}
    lctx.strokeStyle='rgba(120,0,0,.3)';lctx.lineWidth=2;
    lctx.beginPath();lctx.moveTo(-r*.08,-r);lctx.lineTo(r*.05,r);lctx.stroke();
  } else if(type==='kensei'){
    lctx.strokeStyle='rgba(80,140,255,.35)';lctx.lineWidth=1.2;
    for(let ly=-r+5;ly<r;ly+=6){lctx.beginPath();lctx.moveTo(-r,ly);lctx.lineTo(r,ly);lctx.stroke();}
    lctx.strokeStyle='rgba(200,160,0,.45)';lctx.lineWidth=2;
    lctx.beginPath();lctx.moveTo(-r*.08,-r);lctx.lineTo(-r*.08,r);lctx.stroke();
    lctx.beginPath();lctx.moveTo(-r,0);lctx.lineTo(r,0);lctx.stroke();
  } else if(type==='hayabusa'){
    lctx.strokeStyle='rgba(150,0,255,.3)';lctx.lineWidth=1;
    for(let d=-r*2;d<r*2;d+=9){lctx.beginPath();lctx.moveTo(d,-r);lctx.lineTo(d+r*2,r);lctx.stroke();}
  } else { // oni
    lctx.strokeStyle='rgba(80,200,0,.28)';lctx.lineWidth=2;
    for(let ly=-r+5;ly<r;ly+=10){lctx.beginPath();lctx.moveTo(-r,ly);lctx.lineTo(r,ly);lctx.stroke();}
    lctx.strokeStyle='rgba(80,200,0,.45)';lctx.lineWidth=3.5;
    for(let lx=-r+10;lx<r;lx+=18){lctx.beginPath();lctx.moveTo(lx,-r);lctx.lineTo(lx,r);lctx.stroke();}
  }
  lctx.restore();

  // Outer glow ring
  lctx.shadowBlur=20+pulse*14;lctx.shadowColor=C.theme+'cc';
  lctx.strokeStyle=C.theme;lctx.lineWidth=type==='oni'?3.5:2.5;
  lctx.beginPath();lctx.arc(0,0,r,0,PI2);lctx.stroke();
  lctx.shadowBlur=10;lctx.shadowColor=C.theme+'66';
  lctx.strokeStyle=C.col+'55';lctx.lineWidth=1.5;
  lctx.beginPath();lctx.arc(0,0,r*.82,0,PI2);lctx.stroke();
  lctx.shadowBlur=0;

  // ── SHOULDER GUARDS ──────────────────────────────────────────
  if(type==='kage'||type==='kensei'){
    const scol=type==='kensei'?'#000820':'#1a0000';
    const sring=type==='kensei'?'#4466cc':'#cc1100';
    for(const sy of[-1,1]){
      lctx.save();lctx.translate(-r*.06,sy*r*.73);
      lctx.fillStyle=scol;lctx.strokeStyle=sring;lctx.lineWidth=2;
      lctx.beginPath();
      lctx.moveTo(-r*.32,-r*.17);lctx.lineTo(r*.32,-r*.17);
      lctx.lineTo(r*.26,r*.17);lctx.lineTo(-r*.26,r*.17);lctx.closePath();
      lctx.fill();lctx.stroke();
      if(type==='kensei'){lctx.fillStyle='rgba(200,160,0,.35)';lctx.fillRect(-r*.28,-r*.05,r*.56,r*.1);}
      else{lctx.fillStyle='rgba(200,0,0,.45)';lctx.fillRect(-r*.28,-r*.05,r*.56,r*.1);}
      lctx.restore();
    }
  } else if(type==='oni'){
    for(const sy of[-1,1]){
      lctx.save();lctx.translate(-r*.05,sy*r*.78);
      lctx.fillStyle='#0a1a05';lctx.strokeStyle='#66cc00';lctx.lineWidth=2.5;
      lctx.beginPath();
      lctx.moveTo(-r*.44,-r*.2);lctx.lineTo(r*.44,-r*.2);
      lctx.lineTo(r*.36,r*.2);lctx.lineTo(-r*.36,r*.2);lctx.closePath();
      lctx.fill();lctx.stroke();
      // Gold stud
      lctx.fillStyle='#aacc00';lctx.shadowBlur=5;lctx.shadowColor='#aaff00';
      lctx.beginPath();lctx.arc(0,0,r*.09,0,PI2);lctx.fill();lctx.shadowBlur=0;
      lctx.restore();
    }
  }

  // ── HEAD & HELMET ─────────────────────────────────────────────
  const hx=r*.5;

  if(type==='oni'){
    // Neck guard
    lctx.fillStyle='#040a04';lctx.strokeStyle='#1a3300';lctx.lineWidth=1;
    lctx.beginPath();lctx.arc(hx,0,r*.48,Math.PI*.28,Math.PI*1.72);lctx.closePath();lctx.fill();lctx.stroke();
    // Dome
    const helG=lctx.createRadialGradient(hx-r*.1,-r*.14,r*.03,hx,0,r*.35);
    helG.addColorStop(0,'#1a2a0e');helG.addColorStop(.5,'#0a1605');helG.addColorStop(1,'#000');
    lctx.fillStyle=helG;lctx.beginPath();lctx.arc(hx,0,r*.32,0,PI2);lctx.fill();
    // Gold ring on helmet
    lctx.strokeStyle='#aacc00';lctx.lineWidth=1.5;lctx.shadowBlur=6;lctx.shadowColor='#aaff00';
    lctx.beginPath();lctx.arc(hx,0,r*.32,0,PI2);lctx.stroke();lctx.shadowBlur=0;
    // HORNS
    for(const sy of[-1,1]){
      lctx.save();lctx.scale(1,sy);
      lctx.fillStyle='#cc8800';lctx.strokeStyle='#ffcc00';lctx.lineWidth=1.5;
      lctx.beginPath();
      lctx.moveTo(hx+r*.04,r*.1);
      lctx.quadraticCurveTo(hx+r*.09,r*.6,hx+r*.27,r*.75);
      lctx.quadraticCurveTo(hx+r*.34,r*.8,hx+r*.2,r*.58);
      lctx.quadraticCurveTo(hx+r*.14,r*.38,hx+r*.1,r*.12);
      lctx.closePath();lctx.fill();lctx.stroke();
      lctx.restore();
    }
    // Demon mempo
    lctx.fillStyle='#550000';lctx.strokeStyle='#992200';lctx.lineWidth=2;
    lctx.beginPath();lctx.arc(hx+r*.05,0,r*.25,-Math.PI*.6,Math.PI*.6);lctx.fill();lctx.stroke();
    // Demon teeth
    lctx.fillStyle='#eeddbb';lctx.strokeStyle='#cc8800';lctx.lineWidth=0.5;
    for(let t=0;t<3;t++){
      lctx.beginPath();
      lctx.moveTo(hx+r*(.16+t*.07),r*.08);
      lctx.lineTo(hx+r*(.19+t*.07),r*.19);
      lctx.lineTo(hx+r*(.12+t*.07),r*.08);
      lctx.closePath();lctx.fill();lctx.stroke();
    }
  } else if(type==='kensei'){
    // Neck guard
    lctx.fillStyle='#02050f';lctx.strokeStyle='#222244';lctx.lineWidth=1;
    lctx.beginPath();lctx.arc(hx,0,r*.44,Math.PI*.26,Math.PI*1.74);lctx.closePath();lctx.fill();lctx.stroke();
    // Dome
    const helG=lctx.createRadialGradient(hx-r*.09,-r*.13,r*.03,hx,0,r*.32);
    helG.addColorStop(0,'#1a2244');helG.addColorStop(.5,'#060818');helG.addColorStop(1,'#000');
    lctx.fillStyle=helG;lctx.beginPath();lctx.arc(hx,0,r*.3,0,PI2);lctx.fill();
    // Blue ring
    lctx.strokeStyle='#4466cc';lctx.lineWidth=1.5;lctx.shadowBlur=8;lctx.shadowColor='#4488ff';
    lctx.beginPath();lctx.arc(hx,0,r*.3,0,PI2);lctx.stroke();lctx.shadowBlur=0;
    // Elegant gold crest (single tall spike)
    lctx.fillStyle='#ccaa00';lctx.strokeStyle='#ffdd44';lctx.lineWidth=1;lctx.shadowBlur=6;lctx.shadowColor='#ffcc00';
    lctx.beginPath();lctx.moveTo(hx+r*.04,-r*.32);lctx.lineTo(hx+r*.12,-r*.68);lctx.lineTo(hx+r*.2,-r*.32);lctx.closePath();
    lctx.fill();lctx.stroke();lctx.shadowBlur=0;
    // Lower half-mask
    lctx.fillStyle='#030918';lctx.strokeStyle='#334488';lctx.lineWidth=1;
    lctx.beginPath();lctx.arc(hx+r*.04,r*.07,r*.19,-Math.PI*.05,Math.PI*.72);lctx.fill();lctx.stroke();
  } else if(type==='hayabusa'){
    // Minimal hood
    lctx.fillStyle='#080014';lctx.beginPath();lctx.arc(hx,0,r*.35,0,PI2);lctx.fill();
    // Cloth strips
    lctx.strokeStyle='rgba(120,0,200,.5)';lctx.lineWidth=1.5;
    for(let a=0;a<3;a++){
      const ang=(-0.38+a*.38);
      lctx.beginPath();
      lctx.moveTo(hx+Math.cos(ang+Math.PI)*r*.35,Math.sin(ang+Math.PI)*r*.35);
      lctx.lineTo(hx+Math.cos(ang)*r*.35,Math.sin(ang)*r*.35);
      lctx.stroke();
    }
    // Visor slit
    lctx.fillStyle='rgba(0,20,30,.9)';
    lctx.fillRect(hx+r*.02,-r*.055,r*.32,r*.11);
    // Cyan visor glow
    lctx.shadowBlur=8;lctx.shadowColor='#00ffcc';
    lctx.strokeStyle='rgba(0,255,200,.25)';lctx.lineWidth=1;
    lctx.strokeRect(hx+r*.02,-r*.055,r*.32,r*.11);lctx.shadowBlur=0;
    // Orbiting shurikens (decorative)
    const sAng=tick*.05;
    for(let si=0;si<2;si++){
      const sa=sAng+si*Math.PI;
      const sx=Math.cos(sa)*r*1.25,sy2=Math.sin(sa)*r*.75;
      lctx.save();lctx.translate(sx,sy2);lctx.rotate(sa*3);
      lctx.shadowBlur=6;lctx.shadowColor='#00ffcc';
      const sr2=r*.16;
      lctx.fillStyle='#aaffee';lctx.beginPath();
      for(let pi=0;pi<8;pi++){const pa=pi/8*PI2;const rad=pi%2===0?sr2:sr2*.45;pi===0?lctx.moveTo(Math.cos(pa)*rad,Math.sin(pa)*rad):lctx.lineTo(Math.cos(pa)*rad,Math.sin(pa)*rad);}
      lctx.closePath();lctx.fill();lctx.shadowBlur=0;lctx.restore();
    }
  } else { // kage
    lctx.fillStyle='#0e0000';lctx.strokeStyle='#440000';lctx.lineWidth=1;
    lctx.beginPath();lctx.arc(hx,0,r*.44,Math.PI*.26,Math.PI*1.74);lctx.closePath();lctx.fill();lctx.stroke();
    const helG=lctx.createRadialGradient(hx-r*.09,-r*.13,r*.03,hx,0,r*.33);
    helG.addColorStop(0,'#2a2a2a');helG.addColorStop(.5,'#110000');helG.addColorStop(1,'#000');
    lctx.fillStyle=helG;lctx.beginPath();lctx.arc(hx,0,r*.31,0,PI2);lctx.fill();
    // Maedate crests
    for(const sy of[-1,1]){
      lctx.save();lctx.scale(1,sy);
      lctx.fillStyle='#880000';lctx.strokeStyle='#cc2200';lctx.lineWidth=1;
      lctx.beginPath();lctx.moveTo(hx+r*.2,r*.03);lctx.lineTo(hx+r*.55,r*.42);lctx.lineTo(hx+r*.60,r*.38);lctx.lineTo(hx+r*.26,r*.01);lctx.closePath();lctx.fill();lctx.stroke();
      lctx.fillStyle='#ffaa00';lctx.beginPath();lctx.moveTo(hx+r*.27,r*.02);lctx.lineTo(hx+r*.57,r*.40);lctx.lineTo(hx+r*.60,r*.38);lctx.lineTo(hx+r*.3,r*.01);lctx.closePath();lctx.fill();
      lctx.restore();
    }
    // Mempo
    lctx.fillStyle='#550000';lctx.strokeStyle='#881100';lctx.lineWidth=1.5;
    lctx.beginPath();lctx.arc(hx+r*.05,0,r*.23,-Math.PI*.62,Math.PI*.62);lctx.fill();lctx.stroke();
    lctx.strokeStyle='rgba(200,0,0,.45)';lctx.lineWidth=1;
    lctx.beginPath();lctx.moveTo(hx+r*.08,r*.06);lctx.lineTo(hx+r*.26,r*.1);lctx.stroke();
    lctx.beginPath();lctx.moveTo(hx+r*.08,-r*.06);lctx.lineTo(hx+r*.26,-r*.1);lctx.stroke();
  }

  // ── EYES ─────────────────────────────────────────────────────
  lctx.shadowBlur=18+pulse*14;lctx.shadowColor=C.eye;lctx.fillStyle=C.eye;
  if(type==='hayabusa'){
    lctx.fillRect(hx+r*.06,-r*.038,r*.27,r*.076);
  } else if(type==='oni'){
    lctx.beginPath();lctx.ellipse(hx+r*.09,-r*.1,r*.17,r*.068,0,0,PI2);lctx.fill();
    lctx.beginPath();lctx.ellipse(hx+r*.09,r*.1,r*.17,r*.068,0,0,PI2);lctx.fill();
  } else {
    lctx.fillRect(hx+r*.08,-r*.075,r*.26,r*.15);
    lctx.shadowBlur=8;lctx.shadowColor=C.eye2;lctx.fillStyle=C.eye2;
    lctx.fillRect(hx+r*.1,-r*.045,r*.22,r*.09);
  }
  lctx.shadowBlur=0;

  // ── WEAPON ───────────────────────────────────────────────────
  if(type==='kensei'){
    // Long nodachi handle
    lctx.save();lctx.translate(r*.05,r*.38);lctx.rotate(-0.07);
    lctx.fillStyle='#0a0820';lctx.fillRect(0,-r*.07,r*.68,r*.14);
    lctx.strokeStyle='#334488';lctx.lineWidth=1.5;
    for(let wx=0;wx<r*.68;wx+=r*.14){
      lctx.beginPath();lctx.moveTo(wx,-r*.07);lctx.lineTo(wx+r*.12,r*.07);lctx.stroke();
      lctx.beginPath();lctx.moveTo(wx+r*.12,-r*.07);lctx.lineTo(wx,r*.07);lctx.stroke();
    }
    lctx.restore();
    // Tsuba
    lctx.save();lctx.translate(r*.73,r*.33);
    lctx.fillStyle='#223366';lctx.strokeStyle='#4466cc';lctx.lineWidth=2;
    lctx.beginPath();lctx.ellipse(0,0,r*.15,r*.1,-.08,0,PI2);lctx.fill();lctx.stroke();
    lctx.fillStyle='#ccaa00';lctx.beginPath();lctx.ellipse(0,0,r*.06,r*.04,0,0,PI2);lctx.fill();
    lctx.restore();
    // Very long blade
    lctx.shadowBlur=18+pulse*14;lctx.shadowColor=`rgba(140,190,255,${0.8+pulse*.2})`;
    lctx.strokeStyle='#cce0ff';lctx.lineWidth=3;
    lctx.beginPath();lctx.moveTo(r*.87,r*.28);lctx.lineTo(r*4.8,r*.02);lctx.stroke();
    lctx.strokeStyle=`rgba(220,240,255,${0.55+pulse*.35})`;lctx.lineWidth=1.5;
    lctx.beginPath();lctx.moveTo(r*.87,r*.25);lctx.lineTo(r*4.8,-r*.01);lctx.stroke();
    lctx.shadowBlur=14+pulse2*12;lctx.shadowColor=`rgba(80,140,255,${0.6+pulse2*.4})`;
    lctx.strokeStyle=`rgba(80,140,255,${0.4+pulse2*.3})`;lctx.lineWidth=5;
    lctx.beginPath();lctx.moveTo(r*.87,r*.27);lctx.lineTo(r*1.5,r*.22);lctx.stroke();
    lctx.shadowBlur=0;
  } else if(type==='hayabusa'){
    // Short tanto
    lctx.save();lctx.translate(r*.15,r*.28);lctx.rotate(-0.18);
    lctx.fillStyle='#0a001a';lctx.fillRect(0,-r*.05,r*.32,r*.1);
    lctx.restore();
    lctx.shadowBlur=14+pulse*10;lctx.shadowColor=`rgba(0,255,200,.7)`;
    lctx.strokeStyle='#aaffee';lctx.lineWidth=2.5;
    lctx.beginPath();lctx.moveTo(r*.47,r*.22);lctx.lineTo(r*1.75,r*.04);lctx.stroke();
    lctx.strokeStyle=`rgba(180,255,240,.5)`;lctx.lineWidth=1;
    lctx.beginPath();lctx.moveTo(r*.47,r*.19);lctx.lineTo(r*1.75,r*.01);lctx.stroke();
    lctx.shadowBlur=0;
  } else if(type==='oni'){
    // Kanabo handle
    lctx.save();lctx.translate(r*.1,r*.48);lctx.rotate(-0.1);
    lctx.fillStyle='#1a0800';lctx.strokeStyle='#553300';lctx.lineWidth=1;
    lctx.fillRect(0,-r*.11,r*.52,r*.22);lctx.strokeRect(0,-r*.11,r*.52,r*.22);
    lctx.restore();
    // Club body (thick)
    lctx.shadowBlur=12+pulse*10;lctx.shadowColor=`rgba(100,220,0,${0.6+pulse*.3})`;
    lctx.strokeStyle='#223300';lctx.lineWidth=11;
    lctx.beginPath();lctx.moveTo(r*.62,r*.4);lctx.lineTo(r*2.0,r*.06);lctx.stroke();
    lctx.strokeStyle='#aacc00';lctx.lineWidth=2;
    lctx.beginPath();lctx.moveTo(r*.65,r*.36);lctx.lineTo(r*1.95,r*.04);lctx.stroke();
    // Spikes
    lctx.fillStyle='#ccee00';lctx.shadowBlur=6;lctx.shadowColor='#aaff00';
    const kAng=Math.atan2(r*.06-r*.4,r*2.0-r*.62);
    for(let sp=0;sp<4;sp++){
      const st=r*(.78+sp*.3),ss=r*.37-sp*.07;
      lctx.save();lctx.translate(st,ss);lctx.rotate(kAng+Math.PI/2);
      lctx.beginPath();lctx.moveTo(0,-r*.13);lctx.lineTo(r*.06,r*.06);lctx.lineTo(-r*.06,r*.06);lctx.closePath();lctx.fill();
      lctx.restore();
    }
    lctx.shadowBlur=0;
  } else { // kage
    lctx.save();lctx.translate(r*.1,r*.42);lctx.rotate(-0.09);
    lctx.fillStyle='#1a0600';lctx.fillRect(0,-r*.08,r*.5,r*.16);
    lctx.strokeStyle='#cc1100';lctx.lineWidth=2;
    for(let wx=0;wx<r*.5;wx+=r*.12){
      lctx.beginPath();lctx.moveTo(wx,-r*.08);lctx.lineTo(wx+r*.1,r*.08);lctx.stroke();
      lctx.beginPath();lctx.moveTo(wx+r*.1,-r*.08);lctx.lineTo(wx,r*.08);lctx.stroke();
    }
    lctx.restore();
    lctx.save();lctx.translate(r*.6,r*.38);
    lctx.fillStyle='#770000';lctx.strokeStyle='#cc4400';lctx.lineWidth=2;
    lctx.beginPath();lctx.ellipse(0,0,r*.16,r*.11,-.1,0,PI2);lctx.fill();lctx.stroke();
    lctx.fillStyle='#ffaa00';lctx.beginPath();lctx.ellipse(0,0,r*.06,r*.04,-.1,0,PI2);lctx.fill();
    lctx.restore();
    lctx.shadowBlur=14+pulse*10;lctx.shadowColor=`rgba(180,210,255,${0.7+pulse*.3})`;
    lctx.strokeStyle='#ddeeff';lctx.lineWidth=3.5;
    lctx.beginPath();lctx.moveTo(r*.76,r*.35);lctx.quadraticCurveTo(r*1.8,r*.24,r*3.0,r*.04);lctx.stroke();
    lctx.strokeStyle=`rgba(255,255,255,${0.5+pulse*.35})`;lctx.lineWidth=1.5;
    lctx.beginPath();lctx.moveTo(r*.76,r*.31);lctx.quadraticCurveTo(r*1.8,r*.2,r*3.0,r*.01);lctx.stroke();
    lctx.shadowBlur=12+pulse2*10;lctx.shadowColor=`rgba(255,0,0,${0.5+pulse2*.4})`;
    lctx.strokeStyle=`rgba(255,${40+pulse2*30},0,${0.35+pulse2*.25})`;lctx.lineWidth=5;
    lctx.beginPath();lctx.moveTo(r*.76,r*.33);lctx.lineTo(r*1.3,r*.27);lctx.stroke();
    lctx.shadowBlur=0;
  }

  lctx.restore();
}

// ── CHARACTER SELECT UI ───────────────────────────────────────────
const STAT_LABELS={spd:'SPD',reach:'RCH',hp:'HP',spc:'SPC'};

function buildCharCards(){
  const grid=document.getElementById('charGrid');
  if(grid.children.length)return;
  Object.entries(CHARS).forEach(([key,ch])=>{
    const card=document.createElement('div');
    card.className='char-card';card.id='card_'+key;
    const cvs=document.createElement('canvas');
    cvs.width=88;cvs.height=108;cvs.id='prev_'+key;
    const statsHTML=Object.entries(ch.stats).map(([s,v])=>`
      <div class="stat-row">
        <div class="stat-lbl">${STAT_LABELS[s]}</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${v/5*100}%;background:${ch.col}"></div></div>
      </div>`).join('');
    card.innerHTML=`
      <div class="char-kanji" style="text-shadow:0 0 10px ${ch.theme}">${ch.kanji}</div>
      <div class="char-name" style="color:${ch.col}">${ch.name}</div>
      <div class="char-sub">${ch.title}</div>
      <div class="stats-wrap">${statsHTML}</div>`;
    card.insertBefore(cvs,card.firstChild);
    card.addEventListener('click',()=>selectChar(key));
    grid.appendChild(card);
  });
}

function selectChar(key){
  selectedChar=key;
  Object.keys(CHARS).forEach(k=>{
    const card=document.getElementById('card_'+k);
    if(!card)return;
    if(k===key){
      card.style.borderColor=CHARS[k].theme;
      card.style.boxShadow=`0 0 20px ${CHARS[k].theme}55,inset 0 0 12px ${CHARS[k].theme}18`;
      card.style.background='rgba(0,0,0,.78)';
    } else {
      card.style.borderColor='rgba(255,255,255,.1)';
      card.style.boxShadow='none';
      card.style.background='rgba(0,0,0,.45)';
    }
  });
  document.getElementById('charDesc').textContent=CHARS[key].desc;
}

function showCharSelect(){
  buildCharCards();
  selectChar(selectedChar);
  document.getElementById('ov').style.display='flex';
  ['menuPanel','goPanel'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('charPanel').style.display='flex';
  // Animate previews
  if(previewRaf)cancelAnimationFrame(previewRaf);
  const previewR={kage:20,kensei:17,hayabusa:14,oni:24};
  const previewCenter={kage:[36,60],kensei:[30,62],hayabusa:[38,60],oni:[38,66]};
  function animPrev(){
    previewTick++;
    Object.keys(CHARS).forEach(key=>{
      const cvs=document.getElementById('prev_'+key);
      if(!cvs)return;
      const pc=cvs.getContext('2d');
      pc.fillStyle='#07030a';pc.fillRect(0,0,88,108);
      // Floor hint
      pc.fillStyle='#0e0b08';pc.fillRect(0,70,88,38);
      pc.strokeStyle=`${CHARS[key].theme}22`;pc.lineWidth=1;pc.setLineDash([4,6]);
      pc.beginPath();pc.moveTo(0,70);pc.lineTo(88,70);pc.stroke();pc.setLineDash([]);
      const [cx,cy]=previewCenter[key];
      const face=Math.sin(previewTick*.024)*.28;
      drawCharacter(pc,key,cx,cy,previewR[key],face,previewTick,{});
    });
    previewRaf=requestAnimationFrame(animPrev);
  }
  previewRaf=requestAnimationFrame(animPrev);
}

// ── ENEMY TYPES ─────────────────────────────────────────────────
const ETYPES=[
  {type:'ninja',    r:14, spd:2.0, hp:1, acc:'#44aaff', pts:10},
  {type:'assassin', r:11, spd:3.0, hp:1, acc:'#ff22aa', pts:15},
  {type:'yari',     r:20, spd:1.2, hp:2, acc:'#44ff66', pts:25},
  {type:'ronin',    r:27, spd:0.85,hp:4, acc:'#ff8800', pts:40},
  {type:'mech',     r:31, spd:0.5, hp:7, acc:'#bb44ff', pts:60},
];

let g=null,raf=null,best=0;

// ── FLOOR ────────────────────────────────────────────────────────
function drawFloor(){
  ctx.fillStyle='#2a2018';ctx.fillRect(0,0,W,H);
  const pw=Math.round(W/7);
  ['#2e2419','#2c2217','#30261b','#282016','#2e2419','#2c2217','#30261b'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(i*pw,0,pw,H);});
  ctx.strokeStyle='#1a1208';ctx.lineWidth=1.5;
  for(let x=0;x<=W;x+=pw){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let y=0;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const cx=W/2,cy=H/2,ar=Math.min(W,H)*.43;
  const ag=ctx.createRadialGradient(cx,cy,ar*.1,cx,cy,ar);
  ag.addColorStop(0,'rgba(100,0,0,.1)');ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);
  [[0,0],[W,0],[0,H],[W,H]].forEach(([lx,ly])=>{
    const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,120);
    lg.addColorStop(0,'rgba(255,50,0,.07)');lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  });
}

// ── ENEMY DRAW ───────────────────────────────────────────────────
function _eBody(r,c1,c2,acc,segs){
  ctx.save();ctx.beginPath();ctx.arc(0,0,r,0,PI2);ctx.clip();
  const ng=ctx.createRadialGradient(-r*.25,-r*.25,r*.06,0,0,r);
  ng.addColorStop(0,c1);ng.addColorStop(1,c2);
  ctx.fillStyle=ng;ctx.fillRect(-r,-r,r*2,r*2);
  if(segs){ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.8;
    for(let a=0;a<segs;a++){const ang=a/segs*PI2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);ctx.stroke();}}
  ctx.restore();
  ctx.shadowBlur=20;ctx.shadowColor=acc+'cc';
  ctx.strokeStyle=acc+'bb';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,0,r,0,PI2);ctx.stroke();ctx.shadowBlur=0;
}
function _eEyes(r,acc,slit){
  ctx.shadowBlur=14;ctx.shadowColor=acc;ctx.fillStyle=acc;
  if(slit){ctx.beginPath();ctx.ellipse(r*.38,0,r*.19,r*.07,0,0,PI2);ctx.fill();}
  else{ctx.beginPath();ctx.ellipse(r*.36,-r*.14,r*.14,r*.055,0,0,PI2);ctx.fill();
       ctx.beginPath();ctx.ellipse(r*.36,r*.14,r*.14,r*.055,0,0,PI2);ctx.fill();}
  ctx.shadowBlur=0;
}
function drawEnemy(e){
  if(e.dead){
    ctx.save();ctx.globalAlpha=Math.max(0,1-e.dieT/18);
    ctx.translate(e.x,e.y);ctx.fillStyle='#440000';
    ctx.beginPath();ctx.arc(0,0,e.r*(1+e.dieT*.14),0,PI2);ctx.fill();
    ctx.restore();return;
  }
  const r=e.r;
  ctx.save();ctx.translate(e.x,e.y);
  ctx.save();ctx.globalAlpha=.28;ctx.fillStyle='#000';ctx.scale(1,.52);ctx.translate(r*.1,r*.45);
  ctx.beginPath();ctx.arc(0,0,r+2,0,PI2);ctx.fill();ctx.restore();
  ctx.rotate(e.face);

  if(e.type==='ninja'){
    _eBody(r,'#1e2030','#08080f',e.acc,5);
    _eEyes(r,e.acc,false);
    ctx.strokeStyle='#99aabb';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(r*.48,0);ctx.lineTo(r*1.65,0);ctx.stroke();
  }
  else if(e.type==='assassin'){
    _eBody(r,'#1e0018','#08000a',e.acc,0);
    _eEyes(r,e.acc,true);
    ctx.strokeStyle='#cc88cc';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(r*.38,-r*.17);ctx.lineTo(r*1.42,-r*.07);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.38,r*.17);ctx.lineTo(r*1.42,r*.07);ctx.stroke();
  }
  else if(e.type==='yari'){
    _eBody(r,'#0c1e0e','#040a05',e.acc,0);
    _eEyes(r,e.acc,false);
    ctx.strokeStyle='#7a6030';ctx.lineWidth=3;ctx.lineCap='butt';
    ctx.beginPath();ctx.moveTo(-r*.3,0);ctx.lineTo(r*2.05,0);ctx.stroke();
    ctx.fillStyle='#aaccaa';ctx.strokeStyle='#88bbaa';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(r*2.05,-r*.23);ctx.lineTo(r*2.85,0);ctx.lineTo(r*2.05,r*.23);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.strokeStyle=e.acc+'99';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(r*.52,-r*.29);ctx.lineTo(r*.52,r*.29);ctx.stroke();
  }
  else if(e.type==='ronin'){
    _eBody(r,'#1e1004','#090400',e.acc,0);
    ctx.fillStyle='#4a3606';ctx.strokeStyle='#6a4e16';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-r*.56,-r*.52);ctx.lineTo(r*.08,-r*1.22);ctx.lineTo(r*.72,-r*.52);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.strokeStyle='#58400e';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-r*.62,-r*.52);ctx.lineTo(r*.78,-r*.52);ctx.stroke();
    _eEyes(r,e.acc,false);
    ctx.strokeStyle='#886030';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(r*.1,r*.26);ctx.lineTo(r*.44,r*.19);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.09,r*.26);ctx.lineTo(r*.07,r*.41);ctx.stroke();
    ctx.strokeStyle='#5a4818';ctx.lineWidth=4.5;ctx.lineCap='butt';
    ctx.beginPath();ctx.moveTo(-r*.18,r*.1);ctx.lineTo(r*.62,r*.08);ctx.stroke();
    ctx.strokeStyle='#c8dde8';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(r*.56,r*.08);ctx.lineTo(r*2.18,r*.02);ctx.stroke();
  }
  else if(e.type==='mech'){
    _eBody(r,'#120820','#050210',e.acc,4);
    ctx.fillStyle='#250842';ctx.fillRect(r*.08,-r*.22,r*.72,r*.44);
    ctx.shadowBlur=16;ctx.shadowColor=e.acc;ctx.fillStyle=e.acc;
    ctx.fillRect(r*.12,-r*.16,r*.26,r*.12);ctx.fillRect(r*.46,-r*.16,r*.26,r*.12);
    ctx.fillRect(r*.12,r*.04,r*.26,r*.12);ctx.fillRect(r*.46,r*.04,r*.26,r*.12);
    ctx.shadowBlur=0;
    ctx.fillStyle='#220640';ctx.strokeStyle=e.acc+'55';ctx.lineWidth=1.5;
    ctx.fillRect(r*.44,-r*.48,r*.62,r*.26);ctx.strokeRect(r*.44,-r*.48,r*.62,r*.26);
    ctx.fillRect(r*.44,r*.22,r*.62,r*.26);ctx.strokeRect(r*.44,r*.22,r*.62,r*.26);
    ctx.strokeStyle=e.acc+'99';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(r*1.06,-r*.35);ctx.lineTo(r*1.65,-r*.35);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*1.06,r*.35);ctx.lineTo(r*1.65,r*.35);ctx.stroke();
  }

  if(e.blinkT>0){ctx.globalAlpha=Math.min(1,e.blinkT/6);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,r,0,PI2);ctx.fill();ctx.globalAlpha=1;}
  if(e.maxHp>1){
    const bw=r*2.9,bh=4,bx=-bw/2,by=-r-9;
    ctx.fillStyle='#1a0000';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#ff4400';ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
  }
  ctx.restore();
}

// ── SHURIKEN DRAW ────────────────────────────────────────────────
function drawShuriken(proj){
  ctx.save();ctx.translate(proj.x,proj.y);
  // Trail
  const tg=ctx.createLinearGradient(-proj.vx*4,-proj.vy*4,0,0);
  tg.addColorStop(0,'rgba(0,255,200,0)');tg.addColorStop(1,'rgba(0,255,200,0.5)');
  ctx.strokeStyle=tg;ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-proj.vx*4,-proj.vy*4);ctx.lineTo(0,0);ctx.stroke();
  // Star
  ctx.rotate(proj.rot);
  ctx.shadowBlur=16;ctx.shadowColor='#00ffcc';
  const sr=7*(W/480);
  ctx.fillStyle='#aaffee';ctx.strokeStyle='#00ccaa';ctx.lineWidth=0.7;
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=i/8*PI2,rad=i%2===0?sr:sr*.45;i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);}
  ctx.closePath();ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.restore();
}

// ── BLOOD ────────────────────────────────────────────────────────
function addBlood(x,y,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*PI2,sp=(spd||3)+Math.random()*4;
    g.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*3,life:24+Math.random()*26,max:50,col:Math.random()<.55?'#cc0000':'#660000'});
  }
  if(g.decals.length<60)g.decals.push({x,y,r:4+Math.random()*9,a:.4+Math.random()*.35});
}

// ── ENEMY AI ─────────────────────────────────────────────────────
function updateEnemyAI(e,p,dt){
  const dx=p.x-e.x,dy=p.y-e.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
  e.face=Math.atan2(dy,dx);
  e.aiT-=dt;
  if(e.aiT<=0){
    const roll=Math.random();
    if(dist>W*.35)e.behavior='approach';
    else{
      if(roll<.35)e.behavior='approach';
      else if(roll<.58)e.behavior='strafe';
      else if(roll<.76)e.behavior='circle';
      else if(roll<.90)e.behavior='dash';
      else e.behavior='feint';
    }
    e.aiT=28+Math.random()*55;e.strafeDir=Math.random()<.5?1:-1;
    if(e.behavior==='dash')e.dashT=18+Math.random()*14;
  }
  let mvx=0,mvy=0;
  e.zigT=(e.zigT||0)+dt*.07;
  const perp=e.face+Math.PI/2;
  switch(e.behavior){
    case 'approach':{const zig=Math.sin(e.zigT*PI2)*.55;mvx=dx/dist+Math.cos(perp)*zig;mvy=dy/dist+Math.sin(perp)*zig;break;}
    case 'strafe':{mvx=Math.cos(perp)*e.strafeDir*.9+dx/dist*.25;mvy=Math.sin(perp)*e.strafeDir*.9+dy/dist*.25;break;}
    case 'circle':{const cAng=Math.atan2(e.y-p.y,e.x-p.x)+.04*e.strafeDir;const tx=p.x+Math.cos(cAng)*38-e.x,ty=p.y+Math.sin(cAng)*38-e.y,tl=Math.sqrt(tx*tx+ty*ty)||1;mvx=tx/tl;mvy=ty/tl;break;}
    case 'dash':{e.dashT-=dt;if(e.dashT<0)e.behavior='approach';mvx=dx/dist*2.2;mvy=dy/dist*2.2;break;}
    case 'feint':{const phase=Math.sin(e.zigT*PI2*1.5);mvx=(dx/dist)*phase*.8;mvy=(dy/dist)*phase*.8;break;}
  }
  const speed=e.behavior==='dash'?e.spd*2.4:e.spd;
  const ml=Math.sqrt(mvx*mvx+mvy*mvy)||1;
  e.x+=mvx/ml*speed*dt;e.y+=mvy/ml*speed*dt;
}

// ── SPAWN ─────────────────────────────────────────────────────────
function spawnEnemy(){
  const sc=W/480,k=g.kills;
  // Weight per type: [ninja, assassin, yari, ronin, mech]
  const w=[
    Math.max(0.08, 0.88-k*0.01),
    Math.min(0.42, k*0.012),
    Math.min(0.28, Math.max(0,(k-10)*0.01)),
    Math.min(0.22, Math.max(0,(k-28)*0.007)),
    Math.min(0.14, Math.max(0,(k-50)*0.005)),
  ];
  const total=w.reduce((a,b)=>a+b,0);
  let rv=Math.random()*total,idx=0;
  for(;idx<w.length-1;idx++){rv-=w[idx];if(rv<=0)break;}
  const type=ETYPES[idx];
  const margin=55;let x,y;
  const side=Math.floor(Math.random()*4);
  if(side===0){x=Math.random()*W;y=-margin;}
  else if(side===1){x=W+margin;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+margin;}
  else{x=-margin;y=Math.random()*H;}
  g.enemies.push({...type,r:type.r*sc,spd:type.spd*sc,x,y,face:0,hp:type.hp,maxHp:type.hp,dead:false,dieT:0,blinkT:0,hitThis:false,behavior:'approach',aiT:Math.random()*40,strafeDir:1,zigT:Math.random(),dashT:0});
}

// ── GAME STATE ────────────────────────────────────────────────────
function newGameState(){
  const sc=W/480,ch=CHARS[selectedChar];
  return{
    charType:selectedChar,
    slashR:ch.slashR*sc,
    player:{x:W/2,y:H/2,r:ch.r*sc,spd:ch.spd*sc,hp:ch.hp,maxHp:ch.hp,face:0,invT:0,walkT:0,moving:false,dashT:0,dashCool:0,dashVx:0,dashVy:0,trail:[]},
    enemies:[],particles:[],decals:[],projectiles:[],
    kills:0,score:0,tick:0,spawnT:0,spawnInt:240,flash:0,shurikenT:0
  };
}

// ── START GAME ────────────────────────────────────────────────────
function startGame(){
  if(previewRaf){cancelAnimationFrame(previewRaf);previewRaf=null;}
  document.getElementById('ov').style.display='none';
  document.getElementById('dpad').style.display='grid';
  document.getElementById('dashBtn').style.display='flex';
  document.getElementById('menuBtn').style.display='block';
  document.getElementById('pausePanel').style.display='none';
  paused=false;blade=[];if(raf)cancelAnimationFrame(raf);
  g=newGameState();let prev=performance.now();

  const triggerDash=()=>{if(g&&g.player.dashCool<=0&&g.player.dashT<=0)g.player._wantDash=true;};
  window._dashKb=(e)=>{if(e.code==='Space'||e.code==='ShiftLeft'||e.code==='ShiftRight'){e.preventDefault();triggerDash();}};
  window.addEventListener('keydown',window._dashKb);
  const dbtn=document.getElementById('dashBtn');
  dbtn.classList.add('ready');
  ['touchstart','mousedown'].forEach(ev=>dbtn.addEventListener(ev,e=>{e.preventDefault();triggerDash();},{passive:false}));

  function frame(ts){
    const dt=Math.min((ts-prev)/16.67,3);prev=ts;g.tick++;
    const p=g.player;
    p.face=Math.atan2(my-p.y,mx-p.x);

    // Movement
    let mvx=0,mvy=0;
    if(keys['w']||keys['arrowup'])mvy=-1;if(keys['s']||keys['arrowdown'])mvy=1;
    if(keys['a']||keys['arrowleft'])mvx=-1;if(keys['d']||keys['arrowright'])mvx=1;
    p.moving=mvx!==0||mvy!==0;
    if(p.moving){const l=Math.sqrt(mvx*mvx+mvy*mvy);
      p.x=Math.max(p.r,Math.min(W-p.r,p.x+mvx/l*p.spd*dt));
      p.y=Math.max(p.r,Math.min(H-p.r,p.y+mvy/l*p.spd*dt));p.walkT+=dt*.08;}
    if(p.invT>0)p.invT-=dt;
    if(g.flash>0)g.flash=Math.max(0,g.flash-dt*5);

    // Dash
    const DASH_DUR=18,DASH_COOL=110,DASH_SPD=44*(W/480);
    if(p._wantDash&&p.dashCool<=0&&p.dashT<=0){
      p._wantDash=false;p.dashT=DASH_DUR;p.dashCool=DASH_COOL;
      p.dashVx=Math.cos(p.face);p.dashVy=Math.sin(p.face);p.trail=[];
      dbtn.classList.remove('ready');dbtn.classList.add('active');
    }
    if(p.dashT>0){
      p.dashT-=dt;
      const spd=DASH_SPD*(p.dashT/DASH_DUR);
      p.x=Math.max(p.r,Math.min(W-p.r,p.x+p.dashVx*spd*dt));
      p.y=Math.max(p.r,Math.min(H-p.r,p.y+p.dashVy*spd*dt));
      p.trail.push({x:p.x,y:p.y,face:p.face,t:p.dashT/DASH_DUR});
      if(p.trail.length>18)p.trail.shift();
      if(p.dashT<=0)dbtn.classList.remove('active');
    }
    if(p.dashCool>0){
      p.dashCool-=dt;
      if(p.dashCool<=0){p.dashCool=0;dbtn.classList.add('ready');document.getElementById('dashCool').textContent='';}
      else document.getElementById('dashCool').textContent=Math.ceil(p.dashCool/60)+'s';
    }

    // Shuriken (Hayabusa)
    if(g.charType==='hayabusa'){
      g.shurikenT+=dt;
      if(g.shurikenT>=42&&g.projectiles.length<8){
        g.shurikenT=0;
        let nearest=null,nearDist=Infinity;
        for(const e of g.enemies){if(e.dead)continue;const dx=e.x-p.x,dy=e.y-p.y,d=dx*dx+dy*dy;if(d<nearDist){nearDist=d;nearest=e;}}
        if(nearest){
          const dx=nearest.x-p.x,dy=nearest.y-p.y,d=Math.sqrt(nearDist)||1;
          const spd2=7.5*(W/480);
          g.projectiles.push({x:p.x,y:p.y,vx:dx/d*spd2,vy:dy/d*spd2,rot:0,life:160,type:'shuriken'});
        }
      }
    }

    // Spawn
    g.spawnT+=dt;
    if(g.spawnT>=g.spawnInt){
      g.spawnT=0;
      const alive=g.enemies.filter(e=>!e.dead).length;
      const maxAlive=Math.min(6,2+Math.floor(g.kills/20));
      if(alive<maxAlive)spawnEnemy();
      g.spawnInt=Math.max(120,240-g.kills*2);
    }

    // Update projectiles
    for(let i=g.projectiles.length-1;i>=0;i--){
      const proj=g.projectiles[i];
      proj.x+=proj.vx*dt;proj.y+=proj.vy*dt;proj.rot+=0.38*dt;proj.life-=dt;
      if(proj.life<=0||proj.x<-20||proj.x>W+20||proj.y<-20||proj.y>H+20){g.projectiles.splice(i,1);continue;}
      for(const e of g.enemies){
        if(e.dead)continue;
        const dx=e.x-proj.x,dy=e.y-proj.y;
        if(dx*dx+dy*dy<(e.r+7)*(e.r+7)){
          e.hp--;e.blinkT=8;
          addBlood(e.x,e.y,e.hp<=0?22:8,e.hp<=0?4.5:2.2);
          if(e.hp<=0){e.dead=true;g.kills++;g.score+=e.pts+5;}
          g.projectiles.splice(i,1);break;
        }
      }
    }

    // Update enemies
    for(let i=g.enemies.length-1;i>=0;i--){
      const e=g.enemies[i];
      if(e.dead){e.dieT+=dt;if(e.dieT>22)g.enemies.splice(i,1);continue;}
      if(e.blinkT>0)e.blinkT-=dt;
      e.hitThis=false;
      updateEnemyAI(e,p,dt);
      const dx=p.x-e.x,dy=p.y-e.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      if(dist<p.r+e.r&&p.invT<=0){
        p.hp--;p.invT=80;g.flash=150;addBlood(e.x,e.y,10,2.5);
        // Oni: knockback nearby enemies when hit
        if(g.charType==='oni'){
          for(const en of g.enemies){if(en.dead)continue;const ex=en.x-p.x,ey=en.y-p.y,ed=Math.sqrt(ex*ex+ey*ey)||1;if(ed<95*(W/480)){en.x+=ex/ed*38;en.y+=ey/ed*38;en.blinkT=7;addBlood(en.x,en.y,5,1.5);}}
        }
        g.enemies.splice(i,1);if(p.hp<=0){endGame();return;}
      }
    }

    // Particles
    for(let i=g.particles.length-1;i>=0;i--){
      const pt=g.particles[i];
      pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=.12*dt;pt.vx*=.96;pt.life-=dt;
      if(pt.life<=0)g.particles.splice(i,1);
    }

    // ═══ DRAW ═══════════════════════════════════════════════════
    drawFloor();
    for(const d of g.decals){ctx.globalAlpha=d.a*.38;ctx.fillStyle='#440000';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,PI2);ctx.fill();}ctx.globalAlpha=1;
    for(const pt of g.particles){const al=pt.life/pt.max;ctx.globalAlpha=al;ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(.5,pt.r*al),0,PI2);ctx.fill();}ctx.globalAlpha=1;
    for(const e of g.enemies)drawEnemy(e);

    // Dash trail
    if(p.trail&&p.trail.length>1){
      for(let i=0;i<p.trail.length-1;i++){
        const ta=p.trail[i],tb=p.trail[i+1],frac=i/p.trail.length;
        ctx.save();ctx.globalAlpha=frac*.55;ctx.shadowBlur=22;ctx.shadowColor='rgba(255,140,0,.8)';
        const dg=ctx.createLinearGradient(ta.x,ta.y,tb.x,tb.y);
        dg.addColorStop(0,'rgba(255,80,0,0)');dg.addColorStop(1,`rgba(255,200,80,${frac*.7})`);
        ctx.strokeStyle=dg;ctx.lineWidth=p.r*2.2*frac;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(ta.x,ta.y);ctx.lineTo(tb.x,tb.y);ctx.stroke();
        ctx.restore();
        if(i%4===0){ctx.save();ctx.globalAlpha=frac*.28;ctx.translate(ta.x,ta.y);ctx.rotate(ta.face);ctx.fillStyle='#ff6600';ctx.shadowBlur=14;ctx.shadowColor='rgba(255,100,0,.9)';ctx.beginPath();ctx.arc(0,0,p.r*.9,0,PI2);ctx.fill();ctx.restore();}
      }
    }

    // Draw samurai
    drawCharacter(ctx,g.charType,p.x,p.y,p.r,p.face,g.tick,{invT:p.invT,moving:p.moving,walkT:p.walkT});

    // Hayabusa shuriken charge arc
    if(g.charType==='hayabusa'){
      const charge=Math.min(1,g.shurikenT/42);
      ctx.save();ctx.translate(p.x,p.y);
      ctx.strokeStyle=`rgba(0,255,200,${0.35+charge*.45})`;ctx.lineWidth=2;
      ctx.shadowBlur=6+charge*14;ctx.shadowColor='#00ffcc';
      ctx.beginPath();ctx.arc(0,0,p.r+7,-Math.PI/2,-Math.PI/2+charge*PI2);ctx.stroke();
      ctx.shadowBlur=0;ctx.restore();
    }

    // Slash radius circle
    {
      const ch=CHARS[g.charType];
      const slashR=g.slashR;
      const pulse=0.5+0.5*Math.sin(g.tick*0.07);
      const slashing=blade.length>3;
      ctx.save();ctx.translate(p.x,p.y);
      ctx.shadowBlur=slashing?22+pulse*14:10+pulse*6;
      ctx.shadowColor=slashing?`${ch.theme}cc`:`${ch.theme}66`;
      ctx.setLineDash([10,7]);ctx.lineDashOffset=-g.tick*.4;
      ctx.strokeStyle=slashing?`${ch.theme}${slashing?'cc':'55'}`:`${ch.theme}38`;
      ctx.lineWidth=slashing?2.5:1.4;
      ctx.beginPath();ctx.arc(0,0,slashR,0,PI2);ctx.stroke();
      ctx.setLineDash([]);ctx.shadowBlur=0;ctx.restore();
    }

    // Projectiles
    for(const proj of g.projectiles)drawShuriken(proj);

    // Blade trail
    const bl=blade;
    if(bl.length>1){
      ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
      ctx.shadowBlur=28;ctx.shadowColor='rgba(220,240,255,.9)';
      for(let i=1;i<bl.length;i++){
        const t=i/bl.length;
        ctx.globalAlpha=t*.94;ctx.lineWidth=t*20;ctx.strokeStyle='#fff';
        ctx.beginPath();ctx.moveTo(bl[i-1].x,bl[i-1].y);ctx.lineTo(bl[i].x,bl[i].y);ctx.stroke();
      }
      const tip=bl[bl.length-1];
      const tg=ctx.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,26);
      tg.addColorStop(0,'rgba(255,255,255,.75)');tg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.globalAlpha=1;ctx.fillStyle=tg;ctx.beginPath();ctx.arc(tip.x,tip.y,26,0,PI2);ctx.fill();
      ctx.restore();
      // Hit detection (only within slashR)
      const n=bl.length;
      const ax=bl[n-2].x,ay=bl[n-2].y,bx=bl[n-1].x,by=bl[n-1].y;
      const la=(bx-ax)*(bx-ax)+(by-ay)*(by-ay);
      const sr2=g.slashR*g.slashR;
      const inRange=(bx-p.x)*(bx-p.x)+(by-p.y)*(by-p.y)<=sr2||(ax-p.x)*(ax-p.x)+(ay-p.y)*(ay-p.y)<=sr2;
      if(la>0.5&&inRange){
        for(const e of g.enemies){
          if(e.dead||e.hitThis)continue;
          if(!segCircle(ax,ay,bx,by,e.x,e.y,e.r*1.4))continue;
          e.hitThis=true;e.hp--;e.blinkT=8;
          addBlood(e.x,e.y,e.hp<=0?25:9,e.hp<=0?5:2.5);
          if(e.hp<=0){e.dead=true;g.kills++;g.score+=e.pts;}
        }
      }
    }

    // HUD
    const ch=CHARS[g.charType];
    const fs=Math.round(W/15);
    ctx.shadowBlur=12;ctx.shadowColor=ch.theme;
    ctx.fillStyle='#fff';ctx.font='bold '+fs+'px Georgia,serif';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(g.kills+' Kills',14,12);ctx.shadowBlur=0;
    ctx.font='15px serif';
    let hs='';for(let i=0;i<p.maxHp;i++)hs+=(i<p.hp?'❤️':'🖤');
    ctx.fillText(hs,14,16+fs);
    ctx.fillStyle=ch.col;ctx.font=Math.round(W/26)+'px Georgia,serif';
    ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText(g.score+' Pkt.',W-14,14);
    // Char indicator
    ctx.fillStyle=ch.theme;ctx.font='bold '+Math.round(W/30)+'px Georgia,serif';
    ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText(ch.kanji+' '+ch.name,W-14,16+Math.round(W/26)+4);

    if(g.tick<260){
      ctx.globalAlpha=Math.min(1,(260-g.tick)/55);
      ctx.fillStyle='rgba(255,200,100,.5)';ctx.font=Math.round(W/42)+'px Georgia,serif';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('Ok tuşları = Hareket  ·  Sürükle = Vuruş',W/2,H-14);
      ctx.globalAlpha=1;
    }
    if(g.flash>0){ctx.globalAlpha=Math.min(g.flash/150,1)*.44;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
    raf=requestAnimationFrame(frame);
  }
  _resumeLoop=()=>{let prev=performance.now();raf=requestAnimationFrame(frame);};
  raf=requestAnimationFrame(frame);
}

// ── END / MENU ────────────────────────────────────────────────────
function endGame(){
  cancelAnimationFrame(raf);blade=[];
  if(window._dashKb)window.removeEventListener('keydown',window._dashKb);
  document.getElementById('dpad').style.display='none';
  document.getElementById('dashBtn').style.display='none';
  document.getElementById('menuBtn').style.display='none';
  const kills=g?g.kills:0,score=g?g.score:0;
  const isNew=score>best&&score>0;if(isNew)best=score;
  saveScore(score,kills);
  g=null;
  document.getElementById('ov').style.display='flex';
  setPanel('goPanel');
  document.getElementById('killsVal').textContent=kills;
  document.getElementById('scoreVal').textContent=score.toLocaleString();
  document.getElementById('recLbl').style.display=isNew?'block':'none';
  if(best>0){document.getElementById('bestLbl').style.display='block';document.getElementById('bestVal').textContent=best.toLocaleString()+' Puan';}
}

// İlk yüklenişte doğru paneli göster
(function init(){
  if(currentUser) showMenu(); else showLogin();
})();

function showMenu(){
  if(!currentUser){showLogin();return;}
  document.getElementById('dpad').style.display='none';
  document.getElementById('dashBtn').style.display='none';
  document.getElementById('menuBtn').style.display='none';
  document.getElementById('ov').style.display='flex';
  setPanel('menuPanel');
  document.getElementById('menuUser').textContent='👤 '+currentUser.name+(currentUser.guest?' (Misafir)':'');
  if(best>0){document.getElementById('bestLbl').style.display='block';document.getElementById('bestVal').textContent=best.toLocaleString()+' Puan';}
}
